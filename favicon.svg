<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#0b1329"/>
      <stop offset="100%" stop-color="#060b18"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="40%" stop-color="#3b82f6"/>
      <stop offset="80%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Card Background -->
  <rect x="16" y="16" width="480" height="480" rx="100" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="12" filter="url(#glow)"/>

  <!-- Book Icon -->
  <g transform="translate(116, 126)">
    <!-- Left Page -->
    <path d="M 20,220 C 60,190 120,190 140,210 L 140,40 C 120,20 60,20 20,50 Z" fill="url(#bookGrad)" stroke="#38bdf8" stroke-width="6" opacity="0.9"/>
    <!-- Right Page -->
    <path d="M 260,220 C 220,190 160,190 140,210 L 140,40 C 160,20 220,20 260,50 Z" fill="url(#bookGrad)" stroke="#fbbf24" stroke-width="6" opacity="0.9"/>
    <!-- Book Lines -->
    <line x1="50" y1="80" x2="110" y2="70" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="50" y1="110" x2="110" y2="100" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="50" y1="140" x2="110" y2="130" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="170" y1="70" x2="230" y2="80" stroke="#fbbf24" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="170" y1="100" x2="230" y2="110" stroke="#fbbf24" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="170" y1="130" x2="230" y2="140" stroke="#fbbf24" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Glowing Lightning Bolt -->
  <polygon points="276,64 164,256 244,256 212,448 356,216 268,216" fill="url(#boltGrad)" filter="url(#glow)"/>
</svg>
